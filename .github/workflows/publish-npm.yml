name: Publish to npm

on:
  push:
    branches:
      - main
    paths:
      - src/**
      - bin/**
      - package.json
      - package-lock.json
      - tsconfig.json
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org/

      - name: Install dependencies
        run: npm ci

      - name: Build CLI
        run: npm run build:cli

      - name: Publish to npm
        run: npm publish --access public
